coverage:
  status:
    project:
      default:
        # Current baseline is ~95% line coverage (Monnify.Tests only - integration
        # tests need real sandbox credentials and are skipped in CI, contributing no
        # coverage). Target sits a few points below that baseline so routine work has
        # headroom, while still catching a real regression.
        target: 85%
        threshold: 1%
    patch:
      default:
        # New/changed lines should be well-tested, but 100% would block reasonable
        # judgment calls (e.g. defensive branches that are hard to hit in a unit test).
        target: 80%

comment:
  layout: "reach, diff, flags, files"
  require_changes: false

ignore:
  - "samples/**"
  - "tests/**"
